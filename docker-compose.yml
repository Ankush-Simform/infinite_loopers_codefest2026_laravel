version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: amrv_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - amrv

  nginx:
    image: nginx:1.29-alpine

    container_name: amrv_nginx

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - amrv

  postgres:
    image: postgres:17

    container_name: amrv_postgres

    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: amrv
      POSTGRES_USER: amrv
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amrv"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - amrv

  redis:
    image: redis:8-alpine

    container_name: amrv_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - amrv

volumes:
  postgres_data:

networks:
  amrv:
    driver: bridge